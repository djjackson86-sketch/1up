<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>1-UP Urban Playground</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#111;color:#fff;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;}
.logo{font-size:52px;font-weight:900;color:#E8FF00;letter-spacing:-1px;margin-bottom:4px;}
.tagline{font-size:13px;color:#888;font-weight:600;letter-spacing:2px;text-transform:uppercase;margin-bottom:40px;}
.links{display:flex;flex-direction:column;gap:12px;width:100%;max-width:340px;}
a.tile{display:flex;align-items:center;gap:14px;background:#1a1a1a;border:1.5px solid #2a2a2a;border-radius:14px;padding:16px 18px;text-decoration:none;color:#fff;transition:border-color 0.15s;}
a.tile:hover{border-color:#E8FF00;}
a.tile .t-icon{font-size:26px;width:40px;text-align:center;flex-shrink:0;}
a.tile .t-text{}
a.tile .t-title{font-weight:800;font-size:15px;}
a.tile .t-sub{font-size:11px;color:#888;margin-top:2px;}
a.tile.staff{border-color:#E8FF00;background:#141400;}
a.tile.staff .t-title{color:#E8FF00;}
.footer{margin-top:40px;font-size:11px;color:#444;text-align:center;}
</style>
</head>
<body>
<div class="logo">1-UP</div>
<div class="tagline">Urban Playground</div>
<div class="links">
  <a class="tile staff" href="/1up_booking_app_2.html">
    <div class="t-icon">📊</div>
    <div class="t-text">
      <div class="t-title">Staff Dashboard</div>
      <div class="t-sub">Bookings · Members · Stock · Setup</div>
    </div>
  </a>
  <a class="tile" href="/1up-party-booking.html">
    <div class="t-icon">🎉</div>
    <div class="t-text">
      <div class="t-title">Kids Party Booking</div>
      <div class="t-sub">Public form — share via WhatsApp</div>
    </div>
  </a>
  <a class="tile" href="/1up-event-booking.html">
    <div class="t-icon">🏟️</div>
    <div class="t-text">
      <div class="t-title">Event / Venue Enquiry</div>
      <div class="t-sub">Public form — share via WhatsApp</div>
    </div>
  </a>
  <a class="tile" href="/1up-member-portal.html">
    <div class="t-icon">🔐</div>
    <div class="t-text">
      <div class="t-title">Member Portal</div>
      <div class="t-sub">Member login · QR card · Visit history</div>
    </div>
  </a>
</div>
<div class="footer">© 2026 1-UP Urban Playground · Fourways &amp; Rosebank</div>
</body>
</html>
